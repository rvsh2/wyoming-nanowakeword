services:
  wyoming-nanowakeword:
    container_name: wyoming-nanowakeword
    build:
      context: .
      dockerfile: Dockerfile
    # Local build tag (not the published ghcr image) so `docker compose up`
    # always uses freshly built code instead of reusing a pulled :latest.
    image: wyoming-nanowakeword:local
    restart: unless-stopped
    ports:
      - "0.0.0.0:10400:10400"
      - "0.0.0.0:10401:10401"
    volumes:
      # Prepared Agata models (E-Branchformer + alternatives) live in ./data.
      # Writable so the HTTP model API can upload/restore models.
      - ./data:/data
    command:
      - wyoming-nanowakeword
      - --uri
      - tcp://0.0.0.0:10400
      - --model-dir
      - /data
      - --default-model
      - agata
      - --zeroconf
      - nanoWakeWord
      - --http-port
      - "10401"
