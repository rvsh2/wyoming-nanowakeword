services:
  wyoming-nanowakeword:
    container_name: wyoming-nanowakeword
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/rvsh2/wyoming-nanowakeword:latest
    restart: unless-stopped
    ports:
      - "0.0.0.0:10400:10400"
    networks:
      - bridge-network
    volumes:
      # Prepared Agata models (E-Branchformer + alternatives) live in ./data.
      - ./data:/data:ro
    command:
      - wyoming-nanowakeword
      - --uri
      - tcp://0.0.0.0:10400
      - --model-dir
      - /data
      - --default-model
      - agata
      - --zeroconf
      - nanoWakeWord

networks:
  bridge-network:
    external: true
