services:
  wyoming-nanowakeword:
    container_name: wyoming-nanowakeword
    build:
      context: .
      dockerfile: Dockerfile
    # Local build tag (not the published ghcr image) so `docker compose up`
    # always uses freshly built code instead of reusing a pulled :latest.
    image: wyoming-nanowakeword:local
    restart: unless-stopped
    ports:
      - "0.0.0.0:10400:10400"
      # Model management API: localhost-only by default. To expose it on the
      # LAN, change to 0.0.0.0 AND set NANOWAKEWORD_HTTP_TOKEN in .env.
      - "127.0.0.1:10401:10401"
    volumes:
      # Prepared Agata models (Conformer v2 + alternatives) live in ./data.
      # Writable so the HTTP model API can upload/restore models.
      - ./data:/data
    # Lets the container reach services published on the docker host
    # (the whisper ASR verifier below).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - wyoming-nanowakeword
      - --uri
      - tcp://0.0.0.0:10400
      - --model-dir
      - /data
      - --default-model
      - agata
      - --zeroconf
      - nanoWakeWord
      - --http-port
      - "10401"
      # Empty token means no auth; set NANOWAKEWORD_HTTP_TOKEN in .env before
      # exposing the API beyond localhost.
      - --http-token
      - ${NANOWAKEWORD_HTTP_TOKEN:-}
      # ASR verification: the sensitive Conformer v2 detector proposes,
      # whisper confirms (0 false accepts + full recall measured on FLEURS).
      # Point this at any whisper.cpp-compatible /inference endpoint;
      # remove the three flags to run the detector alone.
      - --verify-asr-url
      - ${NANOWAKEWORD_ASR_URL:-http://host.docker.internal:4050/inference}
      - --verify-asr-keyword
      - agat
      - --verify-asr-prompt
      - "Agata? Agatka? Agato?"
