# Wake word configuration for the Wyoming NanoWakeWord server.
#
# Exposes a single wake word "agata" backed by the Conformer v2 detector.
# v2 is a deliberately SENSITIVE model: trained on 7 Piper + 22 ElevenLabs
# voices (plus the accepted variants "Agatka" and "Agato"), it recognises
# speakers it has never heard (held-out voices score >=0.999) but on its own
# it false-triggers on continuous speech. It is designed to run behind ASR
# verification (--verify-asr-url, see README "ASR verification"): the
# detector proposes, whisper confirms. Measured end to end on FLEURS pl:
# 0 false accepts, 38/38 recall on the validated positive set (2026-07-08).
#
# Without ASR verification prefer raising the threshold to ~0.95 and expect
# reduced recall on unfamiliar voices — or keep the ensemble verified by a
# central server as before.
models:
  agata:
    phrase: "Agata"
    language: "pl"
    architecture: "conformer (ASR-verified)"
    fusion: "primary_and_verifier"
    version: "v2"
    # Detector operating point measured with the ASR verifier: candidates at
    # 0.6 for 2 consecutive chunks, whisper makes the final call.
    threshold: 0.6
    trigger_level: 2
    members:
      - model: "agata_conformer"
        role: "primary"
        threshold: 0.6

  # Hidden backing models (not shown as separate wake words in Home Assistant).
  agata_ebranchformer:
    hidden: true
    architecture: "e_branchformer"
    version: "v1"
  agata_conformer:
    hidden: true
    architecture: "conformer"
    version: "v2"
  agata_quartznet:
    hidden: true
    architecture: "quartznet"
    version: "v1"
  agata_bcresnet:
    hidden: true
    architecture: "bcresnet"
    version: "v5"
