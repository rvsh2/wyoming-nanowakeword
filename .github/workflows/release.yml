name: Release Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/rvsh2/wyoming-nanowakeword:latest
            ghcr.io/rvsh2/wyoming-nanowakeword:${{ github.ref_name }}

  addon-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            base: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            base: ghcr.io/home-assistant/aarch64-base-debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: nanowakeword/Dockerfile
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ghcr.io/rvsh2/${{ matrix.arch }}-addon-wyoming-nanowakeword:latest
            ghcr.io/rvsh2/${{ matrix.arch }}-addon-wyoming-nanowakeword:${{ github.ref_name }}
