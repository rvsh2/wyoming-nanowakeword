name: Release Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match all declared versions
        run: python3 scripts/check_versions.py "${GITHUB_REF_NAME}"

  image:
    runs-on: ubuntu-latest
    needs: check-versions
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/rvsh2/wyoming-nanowakeword:latest
            ghcr.io/rvsh2/wyoming-nanowakeword:${{ github.ref_name }}

  addon-images:
    runs-on: ubuntu-latest
    needs: check-versions
    strategy:
      matrix:
        include:
          - arch: amd64
            base: ghcr.io/home-assistant/amd64-base-debian:bookworm
            platform: linux/amd64
          - arch: aarch64
            base: ghcr.io/home-assistant/aarch64-base-debian:bookworm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Supervisor pulls <image>:<config.yaml version>, so the tag must be the
      # bare version without the git tag's "v" prefix.
      - name: Version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: nanowakeword/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ghcr.io/rvsh2/${{ matrix.arch }}-addon-wyoming-nanowakeword:latest
            ghcr.io/rvsh2/${{ matrix.arch }}-addon-wyoming-nanowakeword:${{ steps.version.outputs.version }}
